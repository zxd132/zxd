<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>zxd Video Player</title>

<style>
body {
  font-family: sans-serif;
  background: #111;
  color: white;
  text-align: center;
  margin-top: 40px;
}

h1 {
  margin-bottom: 20px;
}

input {
  width: 70%;
  padding: 12px;
  font-size: 16px;
  border-radius: 6px;
  border: none;
}

button {
  margin-top: 10px;
  padding: 10px 25px;
  font-size: 16px;
  cursor: pointer;
  border-radius: 6px;
  border: none;
  background: red;
  color: white;
}

button:hover {
  opacity: 0.8;
}

iframe {
  margin-top: 25px;
  border: none;
}
</style>
</head>

<body>

<h1>zxd</h1>

<input id="url" placeholder="YouTube URLを入力">
<br>
<button onclick="play()">再生</button>

<br>

<iframe id="player" width="560" height="315" allowfullscreen></iframe>

<script>
function getID(url) {
  try {
    const u = new URL(url);

    if (u.searchParams.get("v")) {
      return u.searchParams.get("v");
    }

    if (u.hostname.includes("youtu.be")) {
      return u.pathname.slice(1);
    }

    if (u.pathname.includes("/shorts/")) {
      return u.pathname.split("/shorts/")[1];
    }

  } catch (e) {
    return null;
  }

  return null;
}

function play() {
  const url = document.getElementById("url").value;

  const id = getID(url);

  if (!id) {
    alert("YouTubeのURLを入れてね");
    return;
  }

  document.getElementById("player").src =
    "https://www.youtube.com/embed/" + id;

  // 入力欄をクリア（残らないように）
  document.getElementById("url").value = "";
}
</script>

</body>
</html>
