<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Video Player</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: #111;
  color: white;
  margin-top: 30px;
}

input {
  width: 70%;
  padding: 10px;
  font-size: 16px;
}

button {
  padding: 10px 20px;
  margin-top: 10px;
  cursor: pointer;
}

iframe {
  margin-top: 20px;
  border: none;
}
</style>

</head>

<body>

<h2>zxd Video Player</h2>

<input id="url" placeholder="YouTube URLを入力">

<br>

<button onclick="play()">再生</button>

<br><br>

<iframe id="player" width="560" height="315" allowfullscreen></iframe>

<script>
function play() {
  const url = document.getElementById("url").value;

  let id = null;

  try {
    const u = new URL(url);

    // watch?v=
    if (u.searchParams.get("v")) {
      id = u.searchParams.get("v");
    }

    // youtu.be
    if (!id && u.hostname.includes("youtu.be")) {
      id = u.pathname.slice(1);
    }

    // shorts
    if (!id && u.pathname.includes("/shorts/")) {
      id = u.pathname.split("/shorts/")[1];
    }

  } catch (e) {
    alert("正しいURLを入れてね");
    return;
  }

  if (!id) {
    alert("YouTubeのURLじゃない可能性があるよ");
    return;
  }

  console.log("ID:", id);

  document.getElementById("player").src =
    "https://www.youtube.com/embed/" + id;
}
</script>

</body>
</html>
