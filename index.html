<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Video Tool</title>
<style>
body { font-family: sans-serif; background:#111; color:white; text-align:center; }
input { width:70%; padding:10px; margin-top:20px; }
button { padding:10px 20px; margin:10px; }
iframe { margin-top:20px; }
</style>
</head>

<body>

<h1>Video Tool</h1>

<p>YouTube URLを貼り付けてください</p>

<input id="url" placeholder="https://www.youtube.com/watch?v=...">
<br>
<button onclick="loadVideo()">表示</button>

<div id="info"></div>

<iframe id="player" width="560" height="315" frameborder="0"></iframe>

<script>
function loadVideo() {
  const url = document.getElementById("url").value;

  const id = url.split("v=")[1]?.split("&")[0];

  if (!id) {
    alert("URLが正しくないよ");
    return;
  }

  // 再生
  document.getElementById("player").src =
    "https://www.youtube.com/embed/" + id;

  // サムネ表示
  document.getElementById("info").innerHTML = `
    <img src="https://img.youtube.com/vi/${id}/maxresdefault.jpg" width="300">
  `;
}
</script>

</body>
</html>
