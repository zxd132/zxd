<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>zxd</title>

<style>
body {
  margin: 0;

.header {

  align-items: center;
  padding: 10px 20px;
  background: #181818;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: red;
  margin-right: 20px;
}

  padding: 10px;
  border: none;

}

  padding: 20px;
}

/* 左（動画） */

}

}
</style>
