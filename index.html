<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>test</title>
</head>
<body>

<input id="url" style="width:300px" value="https://www.youtube.com/watch?v=MP-XoUgDnhU">
<button onclick="play()">再生</button>

<br><br>

<iframe id="player" width="560" height="315" allowfullscreen></iframe>

<script>
function play() {
  const url = document.getElementById("url").value;

  const id = new URL(url).searchParams.get("v");

  console.log("ID:", id); // ←確認用

  document.getElementById("player").src =
    "https://www.youtube.com/embed/" + id;
}
</script>

</body>
</html>
