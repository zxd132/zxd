<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学習動画ツール</title>

<style>
body {
  font-family: sans-serif;
  margin: 0;
  padding: 20px;
  background: #f4f6f8;
  text-align: center;
}

h2 {
  color: #333;
}

.box {
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
}

input {
  width: 70%;
  max-width: 500px;
  padding: 12px;
  font-size: 16px;
}

button {
  padding: 12px 18px;
  background: #2b7cff;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 6px;
}

iframe {
  margin-top: 20px;
  width: 90%;
  max-width: 800px;
  height: 400px;
  border: none;
}
</style>
</head>

<body>

<h2>📘 学習動画ツール</h2>

<div class="box">
  <input id="url" placeholder="動画URLを貼る">
  <button onclick="play()">再生</button>
</div>

<iframe id="player"></iframe>

<script>
function getID(url){
  try {
    const u = new URL(url);

    if (u.searchParams.get("v")) return u.searchParams.get("v");
    if (u.hostname.includes("youtu.be")) return u.pathname.slice(1);
    if (u.pathname.includes("/shorts/")) return u.pathname.split("/shorts/")[1];

  } catch(e){}
  return null;
}

function play(){
  const url = document.getElementById("url").value;
  const id = getID(url);

  if(!id){
    alert("URLを入力してください");
    return;
  }

  document.getElementById("player").src =
    "https://www.youtube.com/embed/" + id;
}
</script>

</body>
</html>
