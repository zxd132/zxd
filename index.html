<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>zxd</title>
</head>
<body>

<h1>zxd</h1>

<input type="text" id="url" placeholder="動画URLを入力" style="width:400px;">
<button onclick="playVideo()">再生</button>

<br><br>

<video id="player" width="640" controls></video>

<script>
function playVideo() {
    const url = document.getElementById("url").value;
    document.getElementById("player").src = url;
}
</script>

</body>
</html>
