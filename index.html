<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>video tool</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  margin: 0;
  padding: 20px;
}

input {
  width: 80%;
  max-width: 500px;
  padding: 12px;
  font-size: 16px;
}

button {
  padding: 12px 20px;
  margin-top: 10px;
  font-size: 16px;
  cursor: pointer;
}

iframe {
  width: 90%;
  max-width: 900px;
  height: 500px;
  border: none;
  margin-top: 20px;
}
</style>

</head>

<body>

<h2>動画再生</h2>

<input id="url" placeholder="YouTube URLを入力">
<br>
<button onclick="play()">再生</button>

<br>

<iframe id="player" allowfullscreen></iframe>

<script>
function getID(url) {
  try {
    const u = new URL(url);

    if (u.searchParams.get("v")) return u.searchParams.get("v");
    if (u.hostname.includes("youtu.be")) return u.pathname.slice(1);
    if (u.pathname.includes("/shorts/")) return u.pathname.split("/shorts/")[1];

  } catch (e) {}
  return null;
}

function play() {
  const url = document.getElementById("url").value;
  const id = getID(url);

  if (!id) {
    alert("YouTube URLを入れてね");
    return;
  }

  document.getElementById("player").src =
    "https://www.youtube.com/embed/" + id;
}
</script>

</body>
</html>
